services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: padd
      POSTGRES_USER: padd
      POSTGRES_PASSWORD: padd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
